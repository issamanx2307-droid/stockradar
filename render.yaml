services:
  # ── Django / Daphne (ASGI) — Free tier ─────────────────────────────────────
  - type: web
    name: stockradar-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: daphne -b 0.0.0.0 -p $PORT stockradar.asgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ORIGINS
        value: "https://stockradar-ui.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: stockradar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: stockradar-redis
          type: redis
          property: connectionString
      - key: PYTHONIOENCODING
        value: "utf-8"
      - key: PYTHONUTF8
        value: "1"
      - key: RUN_SCHEDULER
        value: "true"
    healthCheckPath: /api/dashboard/
    autoDeploy: true

  # ── React Frontend — Static Site (ฟรี) ─────────────────────────────────────
  - type: web
    name: stockradar-ui
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://stockradar-api.onrender.com/api
    autoDeploy: true

  # ── Redis — Free tier ────────────────────────────────────────────────────────
  - type: redis
    name: stockradar-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # ── PostgreSQL — Free tier (ใช้ได้ 90 วัน จากนั้น $7/mo หรือ migrate) ───────
  - name: stockradar-db
    plan: free
    databaseName: stockradar
    user: stockradar
