name: Fetch Stock Prices

on:
  schedule:
    # ทุกวันจันทร์-ศุกร์ เวลา 17:30 น. (ไทย) = 10:30 UTC
    # หลัง SET ปิด (16:30) และ US pre-market เริ่ม
    - cron: "30 10 * * 1-5"
  workflow_dispatch:
    inputs:
      days:
        description: "จำนวนวันย้อนหลัง (7=ปกติ, 1825=5ปี, 3650=10ปี)"
        required: false
        default: "7"

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests pandas pandas-datareader yfinance

      - name: Fetch & send prices (daily)
        if: github.event_name == 'schedule'
        env:
          VPS_API_URL:   ${{ secrets.VPS_API_URL }}
          VPS_API_TOKEN: ${{ secrets.VPS_API_TOKEN }}
        run: python scripts/fetch_prices.py --days 7

      - name: Fetch & send prices (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          VPS_API_URL:   ${{ secrets.VPS_API_URL }}
          VPS_API_TOKEN: ${{ secrets.VPS_API_TOKEN }}
        run: python scripts/fetch_prices.py --days ${{ github.event.inputs.days }}

      - name: Trigger engine + news on VPS
        if: success()
        env:
          VPS_API_URL:   ${{ secrets.VPS_API_URL }}
          VPS_API_TOKEN: ${{ secrets.VPS_API_TOKEN }}
        run: |
          curl -s -X POST "${VPS_API_URL}/api/trigger-engine/" \
            -H "X-Import-Token: ${VPS_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --max-time 300 \
            --retry 2 || echo "Engine trigger failed (non-fatal)"
